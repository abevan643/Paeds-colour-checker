*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.strip-cell{flex:1;text-align:center;padding:14px 2px 12px;position:relative;transition:all 0.3s}
.strip-cell.matched{outline:3px solid #1a1a1a;outline-offset:-3px}

// ===== COLOUR ANALYSIS =====
function rgb2hsv(r,g,b){r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;let h=0;if(d){if(mx===r)h=((g-b)/d+(g<b?6:0))*60;else if(mx===g)h=((b-r)/d+2)*60;else h=((r-g)/d+4)*60;}return{h,s:mx?(d/mx)*100:0,v:mx*100};}
function matchColour(hsv,refs){let best=null,bestS=Infinity;for(const ref of refs){const r=ref.hsv;let hD=0,sD=0,vD=0;if(r.hMin>r.hMax){if(!(hsv.h>=r.hMin||hsv.h<=r.hMax))hD=Math.min(Math.abs(hsv.h-r.hMin),Math.abs(hsv.h-r.hMax+360)%360);}else{if(hsv.h<r.hMin)hD=r.hMin-hsv.h;else if(hsv.h>r.hMax)hD=hsv.h-r.hMax;}if(hsv.s<r.sMin)sD=r.sMin-hsv.s;else if(hsv.s>r.sMax)sD=hsv.s-r.sMax;if(hsv.v<r.vMin)vD=r.vMin-hsv.v;else if(hsv.v>r.vMax)vD=hsv.v-r.vMax;const sc=hD*1.0+sD*2.5+vD*1.2;if(sc<bestS){bestS=sc;best={...ref,score:sc};}}return{match:best,confidence:Math.max(0,100-bestS*2)};}
function sampleArea(ctx,x,y,rad){const s=rad*2,sx=Math.max(0,Math.floor(x-rad)),sy=Math.max(0,Math.floor(y-rad));const w=Math.min(s,ctx.canvas.width-sx),h=Math.min(s,ctx.canvas.height-sy);if(w<=0||h<=0)return{r:128,g:128,b:128};const d=ctx.getImageData(sx,sy,w,h).data;let rS=0,gS=0,bS=0,c=0;for(let i=0;i<d.length;i+=4){rS+=d[i];gS+=d[i+1];bS+=d[i+2];c++;}return{r:Math.round(rS/c),g:Math.round(gS/c),b:Math.round(bS/c)};}

// ===== MAIN APP =====
function renderApp() {
  document.getElementById('app').innerHTML = `
    <div class="install-banner" id="installBanner">

    <div class="view-toggle">

          Franciscovich A, et al. <em>PLOS ONE</em>. 2015;10(7):e0132270.<br>
          Shen Z, et al. <em>J Pediatr Surg</em>. 2016;51:2091-2094.<br>

function setMode(m) {
  mode=m; expandedCard=null; analysisResult=null; pickerPos=null; capturedImage=null;
  document.getElementById('tabStool').className='tab-btn'+(m==='stool'?' active':'');
  document.getElementById('tabVomit').className='tab-btn'+(m==='vomit'?' active':'');
  render();
}
function setView(v) {
  view=v;
  document.getElementById('viewCamera').className='view-btn'+(v==='camera'?' active':'');
  document.getElementById('viewRef').className='view-btn'+(v==='reference'?' active':'');
  render();
}
function render() {
  const el=document.getElementById('contentArea');
  if(!el) return;
  if(view==='camera') renderCamera(el); else renderReference(el);
}

function renderCamera(el) {
  let html='';
  if(mode==='stool') html+=renderStoolStrip();
  if(!capturedImage) {
    const subj=mode==='stool'?(lang==='cy'?'carthion yn y cewyn':'stool in the nappy'):(lang==='cy'?'chwydu':'vomit');
    html+=`<div style="display:flex;flex-direction:column;gap:10px">
      <div class="upload-area" onclick="document.getElementById('fileInputCamera').click()">
        <div style="font-size:44px;margin-bottom:12px">📷</div>
        <div style="font-size:16px;font-weight:700;color:#2c2416;margin-bottom:6px">${t('takePhoto')}</div>
        <div style="font-size:13px;color:#8a7d68;line-height:1.5">${t('takePhotoDesc')}</div>
      </div>
      <div class="upload-area" onclick="document.getElementById('fileInputLibrary').click()">
        <div style="font-size:44px;margin-bottom:12px">🖼</div>
        <div style="font-size:16px;font-weight:700;color:#2c2416;margin-bottom:6px">${t('photoLibrary')}</div>
        <div style="font-size:13px;color:#8a7d68;line-height:1.5">${t('photoLibraryDesc')}</div>
      </div>
    </div>
    <input type="file" id="fileInputCamera" accept="image/*" capture="environment" onchange="handleFile(event)" style="display:none">
    <input type="file" id="fileInputLibrary" accept="image/*" onchange="handleFile(event)" style="display:none">
    <div class="tips-box">
      <h3>${t('tipsTitle')}</h3>
      <p>
        <strong>${t('tipLighting')}</strong> ${t('tipLightingDesc')}<br>
        <strong>${t('tipFraming')}</strong> ${t('tipFramingDesc')}<br>
        <strong>${t('tipSampling')}</strong> ${t('tipSamplingDesc')}<br>
        <strong>${t('tipRepeat')}</strong> ${t('tipRepeatDesc')}
      </p>
    </div>`;
  } else {
    const tapText=mode==='stool'?t('tapStool'):t('tapVomit');
    html+=`<div class="canvas-wrap">
      <canvas id="analysisCanvas"></canvas>
      ${pickerPos?`<div class="picker-ring" style="left:${pickerPos.x}px;top:${pickerPos.y}px;${analysisResult?`background:rgb(${analysisResult.col.r},${analysisResult.col.g},${analysisResult.col.b})`:''}" id="pickerRing"></div>`:''}
      ${!pickerPos?`<div class="tap-hint">${tapText}<small>${t('toAnalyse')}</small></div>`:''}
    </div>
    <div class="actions">
      <button class="btn-secondary" onclick="resetCamera()">${t('newPhoto')}</button>
      <button class="btn-primary" onclick="document.getElementById('retakeCamera').click()">${t('retake')}</button>
      <button class="btn-primary" onclick="document.getElementById('retakeLibrary').click()">${t('library')}</button>
    </div>
    <input type="file" id="retakeCamera" accept="image/*" capture="environment" onchange="handleFile(event)" style="display:none">
    <input type="file" id="retakeLibrary" accept="image/*" onchange="handleFile(event)" style="display:none">`;
    if(analysisResult) html+=renderResult(analysisResult);
  }
  el.innerHTML=html;
  if(capturedImage){requestAnimationFrame(()=>{const canvas=document.getElementById('analysisCanvas');if(!canvas)return;const img=new Image();img.onload=()=>{const maxW=el.clientWidth-4,maxH=380,sc=Math.min(maxW/img.width,maxH/img.height,1);canvas.width=img.width*sc;canvas.height=img.height*sc;canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);canvas.onclick=handleCanvasTap;canvas.ontouchstart=handleCanvasTap;};img.src=capturedImage;});}
}

function renderReference(el) {
  const refs=getRefs();let html='';
  if(mode==='stool') html+=renderStoolStrip();
  for(const item of refs){
    const urg=isUrg(item),isExp=expandedCard===item.id;
    const bc=isExp?(urg?'#ef9a9a':'#a5d6a7'):'#e2ddd3';
    const lbl=item.label?tField(item.label):(urg?t('ABNORMAL'):t('NORMAL'));
    html+=`<div class="ref-card${isExp?' expanded':''}" style="border-color:${bc}" onclick="toggleCard('${item.id}')">
      <div class="ref-card-inner">
        <div class="ref-swatch" style="background:${item.hex};border-right:3px solid ${urg?'#c6282840':'#2e7d3230'}">
          ${item.n?`<span class="strip-num ${urg?'abn':'norm'}" style="font-size:18px">${item.n}</span>`:''}
          ${urg?'<span style="font-size:16px">⚠</span>':''}
        </div>
        <div class="ref-content">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div>
              <div class="ref-name">${tField(item.name)}</div>
              <div class="ref-desc">${tField(item.desc)}</div>
            </div>
            <span class="badge ${urg?'badge-urg':'badge-norm'}">${lbl}</span>
          </div>
          ${isExp?`<div class="ref-detail">
            ${tField(item.tip)?`<div class="alert-box" style="background:#fff3e0;border:1px solid #ffe0b2">
              <p style="font-size:12px;color:#e65100;font-weight:600">${tField(item.tip)}</p>
            </div>`:''}
            <div class="alert-box" style="background:${urg?'#fce4ec':'#e8f5e9'};border:1px solid ${urg?'#f8bbd0':'#c8e6c9'}">
              <div class="alert-title" style="color:${urg?'#c62828':'#2e7d32'}">${t('management')}</div>
              <p style="font-size:12px;color:${urg?'#b71c1c':'#1b5e20'}">${tField(item.mgmt)}</p>
            </div>
          </div>`:''}
        </div>
      </div>
    </div>`;
  }
  el.innerHTML=html;
}

function renderStoolStrip() {
  const matchId=analysisResult?.match?.id||expandedCard;
  let h=`<div style="margin-bottom:16px">
    <div class="strip-header">
      <span>${t('stoolCard')}</span>
      <span><span style="color:#c62828">${t('abnormal')}</span> | <span style="color:#2e7d32">${t('normal')}</span></span>
    </div><div class="strip">`;
  for(const c of STOOL_CARDS){const matched=matchId===c.id;h+=`<div class="strip-cell${matched?' matched':''}" style="background:${c.hex}"><div class="strip-num ${c.cat==='abnormal'?'abn':'norm'}">${c.n}</div>${matched?'<div style="position:absolute;bottom:1px;left:50%;transform:translateX(-50%);font-size:10px">▲</div>':''}</div>`;}
  h+='</div></div>';return h;
}

function renderResult(res) {
  const m=res.match,urg=isUrg(m),bc=urg?'#c62828':'#2e7d32',bg=urg?'#fce4ec':'#e8f5e9',tc=urg?'#b71c1c':'#1b5e20';
  let h=`<div class="result" style="border-color:${bc}">
    <div class="result-header" style="background:${bg};border-bottom:1px solid ${bc}40">
      <div class="result-swatch" style="background:rgb(${res.col.r},${res.col.g},${res.col.b})"></div>
      <div>
        <div class="result-label" style="color:${tc}">${urg?(mode==='stool'?t('abnormalInvestigate'):t('redFlag')):t('normalLabel')}</div>
        <div class="result-name">${tField(m.name)}${m.n?`<span style="font-size:14px;font-weight:600;color:#6b5e4a;margin-left:8px">${t('card')} ${m.n}</span>`:''}</div>
      </div>
    </div>
    <div class="result-body">
      <p class="result-desc">${tField(m.desc)}</p>`;
  if(tField(m.tip)){h+=`<div class="alert-box" style="background:#fff3e0;border:1px solid #ffe0b2"><div class="alert-title" style="color:#e65100">${t('keyPoint')}</div><p style="color:#bf360c">${tField(m.tip)}</p></div>`;}
  h+=`<div class="alert-box" style="background:${urg?'#fce4ec':'#f1f8e9'};border:1px solid ${urg?'#f8bbd0':'#c8e6c9'}"><div class="alert-title" style="color:${urg?'#c62828':'#33691e'}">${t('management')}</div><p style="color:${urg?'#b71c1c':'#1b5e20'}">${tField(m.mgmt)}</p></div>`;
  if(mode==='stool'&&urg){h+=`<div class="alert-box" style="background:#fce4ec;border:1px solid #ef9a9a"><div class="alert-title" style="color:#c62828">${t('baAlert')}</div><p style="color:#b71c1c">${t('baText')}</p></div>`;}
  h+=`<div class="tech-toggle" onclick="event.stopPropagation();toggleTech()">${showTech?'▾':'▸'} ${t('colourDetail')}</div>`;
  if(showTech){h+=`<div class="tech-detail"><div>Sampled RGB: (${res.col.r}, ${res.col.g}, ${res.col.b})</div><div>HSV: H=${res.hsv.h.toFixed(1)}° S=${res.hsv.s.toFixed(1)}% V=${res.hsv.v.toFixed(1)}%</div><div>Saturation: ${res.hsv.s<30?t('satLow'):t('satOk')}</div><div>Closest match: ${tField(m.name)} (score: ${m.score.toFixed(1)})</div><div>Confidence: ${res.confidence.toFixed(0)}%</div><div style="margin-top:6px;font-size:10px;font-style:italic">HSV method per Franciscovich et al. (PLOS ONE 2015) and Shen et al. (J Pediatr Surg 2016)</div></div>`;}
  h+='</div></div>';return h;
}

// ===== EVENT HANDLERS =====
function handleFile(e){const f=e.target.files?.[0];if(!f)return;const rd=new FileReader();rd.onload=(ev)=>{capturedImage=ev.target.result;pickerPos=null;analysisResult=null;showTech=false;render();};rd.readAsDataURL(f);}
function handleCanvasTap(e){e.preventDefault();const canvas=document.getElementById('analysisCanvas');if(!canvas)return;const rect=canvas.getBoundingClientRect();const clientX=e.clientX??e.touches?.[0]?.clientX;const clientY=e.clientY??e.touches?.[0]?.clientY;const x=clientX-rect.left,y=clientY-rect.top;const sx=canvas.width/rect.width,sy=canvas.height/rect.height;pickerPos={x,y};const ctx=canvas.getContext('2d');const rad=Math.max(6,Math.min(canvas.width,canvas.height)*0.025);const col=sampleArea(ctx,x*sx,y*sy,rad);const hsv=rgb2hsv(col.r,col.g,col.b);const res=matchColour(hsv,getRefs());analysisResult={...res,col,hsv};showTech=false;render();}
function resetCamera(){capturedImage=null;pickerPos=null;analysisResult=null;showTech=false;render();}
function toggleCard(id){expandedCard=expandedCard===id?null:id;render();}
function toggleTech(){showTech=!showTech;render();}

// ===== PWA INSTALL =====
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;const ib=document.getElementById('installBanner');if(ib)ib.style.display='flex';});
function installPWA(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;dismissInstall();});}}
function dismissInstall(){const ib=document.getElementById('installBanner');if(ib)ib.style.display='none';}

// ===== CLEAR OLD SERVICE WORKER AND CACHES =====
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(registrations){for(let registration of registrations){registration.unregister();}});caches.keys().then(function(names){for(let name of names){caches.delete(name);}});}

renderLangSplash();
</script>
